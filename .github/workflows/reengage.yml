name: Ejecutar Reenganche de Usuarios

on:
  schedule:
    # Se ejecuta cada 30 minutos automáticamente
    - cron: '*/30 * * * *'
  workflow_dispatch: # Permite ejecutar el flujo manualmente desde la interfaz de GitHub

jobs:
  reengage:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar endpoint de Whisper
        run: |
          curl -X POST "https://portomare-chatbot.vercel.app/api/cron/reengage?batch=15" \
          -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET_KEY }}"
